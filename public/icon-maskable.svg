<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Full square background — no rounded corners for maskable clipping -->
  <rect width="192" height="192" fill="url(#bg)"/>
  <!-- Content scaled to fit safe zone (center 80% = 153.6x153.6, offset 19.2)     -->
  <!-- Original 32x32 → scale 4x, offset 32 → center in 192                        -->
  <g transform="translate(32,32) scale(4)">
    <circle cx="13" cy="13" r="6.5" fill="rgba(96,165,250,0.08)" stroke="#60a5fa" stroke-width="2.4"/>
    <line x1="17.6" y1="17.6" x2="23.5" y2="23.5" stroke="url(#handle)" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M10.2 13.5 L12.3 15.7 L16.3 10.2" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
